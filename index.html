<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vòng Quay Giảm Giá</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #2b2b36 0%, #0d0d12 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Hidden Red Button --- */
        #hidden-red-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background-color: #ff0000;
            border-radius: 50%;
            border: none;
            display: none; 
            cursor: pointer;
            z-index: 100;
        }

        h1 {
            font-size: clamp(24px, 8vw, 36px); /* Kích thước chữ tự co giãn */
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* --- Start Screen --- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 30;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        #start-screen h2 {
            font-size: clamp(22px, 6vw, 28px); /* Kích thước chữ tự co giãn */
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .start-btn {
            width: 100%;
            max-width: 350px;
            padding: 15px 20px; /* Thu gọn padding trên mobile */
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, filter 0.2s;
            box-sizing: border-box;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* Metallic Patterns */
        .metal-silver {
            background: repeating-linear-gradient(135deg, 
                #cccccc 0%, #999999 10%, #e6e6e6 20%, 
                #cccccc 30%, #aaaaaa 40%, #ffffff 50%,
                #999999 60%, #e0e0e0 70%, #aaaaaa 80%,
                #cccccc 90%, #b3b3b3 100%);
            box-shadow: 0 5px 20px rgba(153, 153, 153, 0.6), inset 0 0 10px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .metal-gold {
            background: repeating-linear-gradient(135deg,
                #bf9b30 0%, #e6cc80 10%, #ffc107 20%,
                #d9a06f 30%, #ffe066 40%, #ffcc00 50%,
                #b38b1a 60%, #fff8cc 70%, #e0ac1a 80%,
                #bf9b30 90%, #cca300 100%);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.6), inset 0 0 10px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* --- Wheel View --- */
        #wheel-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px; /* Giảm gap trên mobile */
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            z-index: 20;
            width: 100%;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, filter 0.2s;
            max-width: 90vw;
        }

        button:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            transform: none;
        }

        .wheel-container {
            position: relative;
            width: 90vw;             /* Trải rộng theo màn hình mobile */
            max-width: 400px;        /* Giới hạn kích thước tối đa trên Desktop */
            aspect-ratio: 1 / 1;     /* Tự động giữ hình vuông (để tạo hình tròn) */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pointer at top center */
        .pointer {
            position: absolute;
            top: -15px; /* Điều chỉnh một chút cho vừa với viền mobile */
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 25px solid #ff4444; 
            z-index: 15;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid; /* Thu nhỏ viền lại một chút */
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            transition: transform 7s cubic-bezier(0.2, 0.8, 0.1, 1);
        }

        .wheel.normal {
            border-color: #e0e0e0;
            box-shadow: 0 0 30px 10px rgba(200, 200, 200, 0.7);
        }

        .wheel.vip {
            border-color: #fffacd;
            box-shadow: 0 0 40px 15px rgba(255, 215, 0, 0.8);
        }

        /* --- Text inside segments --- */
        .segment {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            transform-origin: 50% 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 15%; /* Sử dụng % thay vì px cứng để chữ đẩy đều khi vòng quay nhỏ lại */
            color: #000;
            font-weight: 900;
            font-size: clamp(14px, 4vw, 20px); /* Chữ nhỏ lại trên đt, tối đa 20px */
            -webkit-text-stroke: 1px #fff;
            text-transform: uppercase;
            text-align: center;
            box-sizing: border-box;
        }

        .segment span {
            max-width: 25vw; /* Điều chỉnh chiều rộng đoạn text theo màn hình */
            line-height: 1.2;
            display: inline-block;
        }

        /* --- Result --- */
        .result-box {
            position: absolute;
            width: 90vw; /* Responsive width */
            max-width: 420px;
            height: auto;
            min-height: 200px; /* Linh hoạt chiều cao */
            padding: 20px;
            box-sizing: border-box;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 25;
            text-align: center;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .result-box.show {
            opacity: 1;
            transform: scale(1);
        }

        .result-type {
            font-size: clamp(16px, 5vw, 24px);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .result-text {
            font-size: clamp(32px, 9vw, 60px); /* Chữ kết quả tự nhỏ lại nếu nội dung quá dài */
            font-weight: 900;
            margin: 0;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6);
            line-height: 1.1;
        }

        /* Result Halo Effects */
        .prize-1k {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            box-shadow: 0 0 50px 20px rgba(0, 198, 255, 0.8);
        }

        .prize-2k {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 0 50px 20px rgba(56, 239, 125, 0.8);
        }

        .prize-3k {
            background: linear-gradient(135deg, #b92b27, #1565C0);
            box-shadow: 0 0 50px 20px rgba(185, 43, 39, 0.8);
        }

        .prize-super {
            background: linear-gradient(135deg, #fc00ff, #00dbde);
            animation: superGlow 1.5s infinite alternate;
        }

        @keyframes superGlow {
            0% { box-shadow: 0 0 30px 10px rgba(252, 0, 255, 0.8); }
            50% { box-shadow: 0 0 60px 25px rgba(0, 219, 222, 0.9); }
            100% { box-shadow: 0 0 30px 10px rgba(255, 215, 0, 1); }
        }
    </style>
</head>
<body>

    <button id="hidden-red-btn"></button>

    <div id="start-screen">
        <h2>CHỌN LOẠI VÒNG QUAY</h2>
        <button class="start-btn metal-silver" onclick="initWheel('normal')">VÒNG BẠC (THƯỜNG)</button>
        <button class="start-btn metal-gold" onclick="initWheel('vip')">VÒNG VÀNG (VIP)</button>
    </div>

    <div id="wheel-view">
        <h1 id="wheel-title">VÒNG QUAY</h1>

        <div class="controls">
            <button id="btnNormal" class="metal-silver" onclick="spin('normal')">Quay Thường</button>
            <button id="btnVip" class="metal-gold" onclick="spin('vip')">Quay VIP</button>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div id="wheel" class="wheel"></div>
            
            <div id="result-overlay" class="result-box">
                <div id="result-type" class="result-type"></div>
                <div id="result-text" class="result-text"></div>
            </div>
        </div>
    </div>

    <script>
        let isSpinning = false;
        let currentRotation = 0;
        let selectedType = '';

        const wheelsData = {
            'normal': {
                segments: 3,
                prizes: ['GIẢM 1K', 'GIẢM 2K', 'GIẢM 3K'],
                gradient: 'conic-gradient(from 0deg, #f0f0f0 0deg 120deg, #c4c4c4 120deg 240deg, #e0e0e0 240deg 360deg)',
                cssClass: 'normal',
                title: 'VÒNG BẠC (THƯỜNG)'
            },
            'vip': {
                segments: 5,
                prizes: ['GIẢM 1K', 'GIẢM 2K', 'GIẢM 3K', 'BỐC THĂM\nSIÊU GIẢM', 'GIẢM 5K'],
                gradient: 'conic-gradient(from 0deg, #ffd700 0deg 72deg, #ff9900 72deg 144deg, #ffc107 144deg 216deg, #ff8c00 216deg 288deg, #ffeb3b 288deg 360deg)',
                cssClass: 'vip',
                title: 'VÒNG VÀNG (VIP)'
            }
        };

        function initWheel(type) {
            selectedType = type;
            const data = wheelsData[type];
            const wheel = document.getElementById('wheel');
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('wheel-view').style.display = 'flex';
            document.getElementById('wheel-title').innerText = data.title;
            
            document.getElementById('btnNormal').style.display = type === 'normal' ? 'block' : 'none';
            document.getElementById('btnVip').style.display = type === 'vip' ? 'block' : 'none';
            
            wheel.className = `wheel ${data.cssClass}`;
            wheel.style.background = data.gradient;
            wheel.innerHTML = ''; 

            const segmentSize = 360 / data.segments;

            for (let i = 0; i < data.segments; i++) {
                const segment = document.createElement('div');
                segment.className = `segment`;
                
                const rotation = (i * segmentSize) + (segmentSize / 2);
                segment.style.transform = `rotate(${rotation}deg)`;
                
                const textSpan = document.createElement('span');
                textSpan.innerText = data.prizes[i];
                segment.appendChild(textSpan);
                
                wheel.appendChild(segment);
            }
        }

        function spin(type) {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel');
            const overlay = document.getElementById('result-overlay');
            const btn = type === 'normal' ? document.getElementById('btnNormal') : document.getElementById('btnVip');

            btn.disabled = true;
            overlay.className = 'result-box'; 

            let rand = Math.random();
            let resultText = '';
            let prizeClass = '';
            let winningSegmentIndex = 0;

            if (type === 'normal') {
                if (rand < 0.70) { 
                    winningSegmentIndex = 0; 
                    resultText = 'GIẢM 1K';
                    prizeClass = 'prize-1k';
                } else { 
                    winningSegmentIndex = 1; 
                    resultText = 'GIẢM 2K';
                    prizeClass = 'prize-2k';
                }
            } else { 
                if (rand < 0.30) { 
                    winningSegmentIndex = 0; 
                    resultText = 'GIẢM 1K';
                    prizeClass = 'prize-1k';
                } else if (rand < 0.90) { 
                    winningSegmentIndex = 1; 
                    resultText = 'GIẢM 2K';
                    prizeClass = 'prize-2k';
                } else if (rand < 0.96) { 
                    winningSegmentIndex = 2; 
                    resultText = 'GIẢM 3K';
                    prizeClass = 'prize-3k';
                } else { 
                    winningSegmentIndex = 3; 
                    resultText = 'BỐC THĂM SIÊU GIẢM GIÁ';
                    prizeClass = 'prize-super';
                }
            }

            const numSegments = wheelsData[type].segments;
            const segmentSize = 360 / numSegments;
            
            const targetCenterAngle = (winningSegmentIndex * segmentSize) + (segmentSize / 2);
            
            const margin = segmentSize * 0.1;
            const randomOffset = (Math.random() * (segmentSize - 2 * margin)) + margin - (segmentSize / 2);
            
            const landingAngle = targetCenterAngle + randomOffset;
            const requiredRotation = 360 - landingAngle;
            
            const extraSpins = 10; 
            const nextStop = requiredRotation + (360 * extraSpins);
            
            const currentMod = currentRotation % 360;
            let addDegrees = nextStop - currentMod;
            if (addDegrees < 360 * 5) { addDegrees += 360; } 
            
            currentRotation += addDegrees;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('result-type').innerText = type === 'normal' ? 'VÒNG BẠC (THƯỜNG)' : 'VÒNG VÀNG (VIP)';
                document.getElementById('result-text').innerText = resultText;
                
                overlay.className = `result-box show ${prizeClass}`;
                
                isSpinning = false;
                btn.disabled = false;
            }, 7000); 
        }
    </script>
</body>
</html>
